name: Greetings Bot

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  greet:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Hello there! Thank you for opening your first issue in the MWareX project! 
            
            A maintainer will review this shortly. In the meantime, please ensure you have provided all the necessary details like reproduction steps and environment info.
          pr-message: |
            🎉 Welcome to the MWareX community! Thank you for submitting your first Pull Request!
            
            Our automated bots will now check your code. A maintainer will review your changes as soon as possible. Thank you for helping us build the future of creator tools!
